name: shopping_store
description: "A new Flutter project."


publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'


  #--------------- PACKAGES --------------#
dependencies:
  flutter:
    sdk: flutter

  # Utility Packages
  http: ^1.2.0
  intl: ^0.20.2
  logger: ^2.1.0
  url_launcher: ^6.2.5
  smooth_page_indicator: ^2.0.1
  connectivity_plus: ^7.1.1
  flutter_native_splash: ^2.3.10
  lottie: ^3.1.0
  shimmer: ^3.0.0
  image_picker: ^1.1.0
  carousel_slider: ^5.1.2
  archive: ^4.0.9

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.6

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Product Specific
  readmore: ^3.0.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  google_fonts: ^8.1.0

  #--------------- PACKAGES END --------------#

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  #--------------- LOCAL ASSETS --------------#
  assets:
    - assets/logos/
    - assets/fonts/
    - assets/icons/
    - assets/icons/brands/
    - assets/icons/categories/
    - assets/icons/payment_methods/
    - assets/images/
    - assets/images/products/
    - assets/images/animations/
    - assets/images/content/
    - assets/images/on_boarding_images/
    - assets/images/reviews/

  
  #--------------- LOCAL FONTS --------------#
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
